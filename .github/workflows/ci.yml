name: ci

on:
  push:
  pull_request:

jobs:
  # Build + run the unit tests under both gcc and clang with strict warnings.
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
      - name: unit tests (-Werror)
        working-directory: k_filter
        run: make test CC=${{ matrix.cc }}

  # Prove the C and Python implementations have not diverged.
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: C-vs-Python parity
        working-directory: k_filter
        run: make parity
      - name: comparison workbench (smoke)
        working-directory: k_filter
        run: make compare

  # Static analysis (cppcheck) over the shipped library.
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: cppcheck (fail on issues)
        working-directory: k_filter
        run: |
          cppcheck --enable=all --std=c99 --inline-suppr \
            --suppress=missingIncludeSystem --suppress=checkersReport \
            --error-exitcode=1 -Iinclude src/k_filter.c

  # Identity guardrail: the runtime must stay freestanding for a real MCU.
  # Breaks the moment someone adds malloc/printf/<math.h> or any forbidden include.
  embedded-guardrail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install arm-none-eabi-gcc
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi
      - name: freestanding cross-compile (Cortex-M0+)
        working-directory: k_filter
        run: make cross
      - name: no forbidden includes in the runtime
        working-directory: k_filter
        run: |
          if grep -nE '#\s*include\s*<(stdlib|stdio|math|malloc|string)\.h>' \
                src/k_filter.c include/k_filter.h; then
            echo "::error::forbidden dependency in the embedded runtime"
            exit 1
          fi
          echo "runtime includes are within the allowed set (stdint/stddef only)"
